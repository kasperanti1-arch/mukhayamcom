<!DOCTYPE html>
<html lang="ar" dir="rtl"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مخيم نت | 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-green: #007A3D; --p-red: #CE1126; --p-black: #000; --p-white: #fff; --p-blue: #2196F3; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 100px; user-select: none; overflow-x: hidden; }
        
        /* الهيدر */
        header { background: url('https://i.postimg.cc/rFNkjcrP/file-00000000deec71f5b16228d79c7647b1.png') center/cover no-repeat; height: 160px; border-bottom: 4px solid var(--p-green); position: relative; }
        .header-tag-right { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); color: white; padding: 6px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; z-index: 10; border: 1px solid rgba(255,255,255,0.2); }
        .header-tag-left { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); color: white; padding: 6px 15px; border-radius: 8px; font-size: 0.8rem; z-index: 10; }

        /* الخبر الهام */
        #urgentArea { margin: 15px; background: white; border-right: 5px solid var(--p-red); border-radius: 8px; padding: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(206, 17, 38, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(206, 17, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(206, 17, 38, 0); } }

        .container { padding: 0 15px 15px 15px; min-height: 40vh; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 10px; }
        .card { background: white; border-radius: 12px; height: 100px; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: 700; padding: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: 1px solid #ddd; cursor: pointer; transition: transform 0.2s; }
        .card:active { transform: scale(0.95); }
        .card-folder { border-right: 6px solid var(--p-blue); }
        .card-popup { border-right: 6px solid #9c27b0; }

        /* السلايدر المتطور المكون من 6 صور */
        .slider-wrapper { position: relative; width: 100%; height: 250px; background: #eee; overflow: hidden; }
        .slider-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .slider-img.active { display: block; }
        .slide-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; padding: 10px 15px; cursor: pointer; font-size: 1.2rem; border-radius: 5px; z-index: 5; }
        .btn-prev { left: 10px; }
        .btn-next { right: 10px; }
        .slide-count { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: white; padding: 2px 10px; border-radius: 15px; font-size: 0.7rem; }

        /* المحتوى المباشر */
        .content-block { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-right: 6px solid var(--p-green); }
        .content-title { background: var(--p-black); color: white; padding: 10px 15px; font-weight: bold; }
        .content-text { padding: 15px; line-height: 1.8; color: #333; white-space: pre-wrap; }

        /* لوحة التحكم ومساحات الكتابة الكبيرة */
        #adminPanel { display: none; position: fixed; inset: 0; background: #fff; z-index: 9999; padding: 20px; overflow-y: auto; }
        .admin-nav { position: sticky; top: -20px; background: #fff; z-index: 100; border-bottom: 2px solid var(--p-green); padding: 10px 0; margin-bottom: 15px; }
        
        .admin-item { background: white; border: 1px solid #eee; padding: 12px; margin-bottom: 8px; border-radius: 8px; border-right: 5px solid var(--p-green); display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .admin-item-info { flex: 1; font-weight: bold; }
        .admin-actions { display: flex; gap: 5px; }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-family: 'Cairo'; font-size: 1rem; box-sizing: border-box; }
        textarea { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-family: 'Cairo'; font-size: 1rem; box-sizing: border-box; min-height: 180px; resize: vertical; line-height: 1.6; }
        
        .btn { border: none; border-radius: 8px; cursor: pointer; font-weight: bold; padding: 12px; font-size: 0.95rem; }
        .btn-sm { padding: 4px 10px; font-size: 0.8rem; border-radius: 5px; }
        .btn-green { background: var(--p-green); color: white; }
        .btn-red { background: var(--p-red); color: white; }
        .btn-blue { background: var(--p-blue); color: white; }
        .btn-orange { background: orange; color: white; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: white; width: 100%; max-width: 500px; border-radius: 15px; max-height: 85vh; overflow-y: auto; }

        /* تعديل الشريط الإخباري اللانهائي المتصل */
        .footer { position: fixed; bottom: 0; width: 100%; z-index: 1000; direction: ltr; }
        .news-bar { background: var(--p-black); color: white; height: 40px; display: flex; align-items: center; overflow: hidden; position: relative; }
        .clock { background: var(--p-green); padding: 0 20px; height: 100%; display: flex; align-items: center; font-weight: bold; z-index: 1002; direction: rtl; position: relative; }
        
        .ticker-wrapper { flex: 1; height: 100%; overflow: hidden; position: relative; display: flex; align-items: center; z-index: 1000; }
        
        /* تكرار متصل متوازي من اليسار لليمين بدون فراغات */
        .ticker-move { display: flex; white-space: nowrap; position: absolute; left: 0; animation: marquee-infinite 25s linear infinite; }
        
        @keyframes marquee-infinite {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0%); }
        }
        .ticker-item { font-size: 0.95rem; direction: rtl; line-height: 40px; padding-left: 60px; font-weight: bold; }
        .copyright { background: #1a1a1a; color: #888; text-align: center; font-size: 0.7rem; padding: 6px 0; direction: rtl; }
    </style>
</head>
<body>

<header id="siteHeader">
    <div class="header-tag-right" id="adminTrigger" onclick="handleAdminClick()">مخيم نت</div>
    <div class="header-tag-left" id="headerDate">السبت، ٢٠ يونيو ٢٠٢٦</div>
</header>

<div id="urgentArea">

        <span style="color:var(--p-red); font-weight:bold;">🔴 خبر هام:</span>

    <button id="urgentMoreBtn" class="btn btn-blue" style="padding: 4px 12px; font-size: 0.8rem; margin: 0; display: none;" onclick="handleUrgentMore()">عرض المزيد ←</button>

<div id="adminPanel">
    <div class="admin-nav">
        <div style="display:flex; justify-content:space-between; align-items:center;">
             <h2 style="margin:0;">منصة الإدارة والأرشفة</h2>
             <button onclick="closeAdmin()" class="btn btn-red" style="padding:5px 10px;">إغلاق X</button>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
            <button class="btn btn-blue" onclick="openAdder('folder')">📁 إضافة قسم / تصنيف</button>
            <button class="btn btn-green" onclick="openAdder('direct')">✍️ إضافة محتوى / منشور</button>
        </div>
    </div>

    <div style="background: #fafafa; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px; border-right: 5px solid orange;">
        <h4>⚙️ الإعدادات العامة للموقع</h4>
        <label>رابط صورة الهيدر:</label> <input type="text" id="headInp">
        <label>نص الخبر الهام:</label> <input type="text" id="urgInp">

            </select>

        <label style="color: var(--p-green); font-weight: bold;">⏱️ سرعة شريط الأخبار بالثواني (كلما قل الرقم زادت السرعة):</label>
        <input type="number" id="newsSpeedInp" min="5" max="100" placeholder="مثال: 25">

        <button class="btn btn-green" style="width:100%; margin-top: 10px;" onclick="saveGlobal()">✅ تحديث الإعدادات العامة</button>
    </div>

    <div id="adminTree"><h4>قائمة التعديل الشامل للهيكلية:</h4></div>
    <button class="btn btn-blue" style="width:100%; border:2px solid #000; margin-top: 15px;" onclick="exportSite()">📥 تصدير وإصدار الكود النهائي المحدث</button>
</div>

<div id="adderModal" class="modal">
    <div class="modal-box" style="padding:20px;">
        <h3 id="modalTitle">تحرير العنصر</h3>
        <input type="hidden" id="editItemId">
        <label>العنوان الأساسي:</label> <input type="text" id="itemTitle" placeholder="أدخل العنوان هنا...">
        
        <div id="extraFields">
            <label>طريقة عرض هذا المحتوى:</label>
            <select id="itemDisplayMode">
                <option value="direct">منشور مباشر معروض داخل القسم</option>
                <option value="popup">نافذة منبثقة مستقلة (Popup)</option>
            </select>
            
            <label style="color: var(--p-blue); font-weight:bold;">🖼️ روابط الصور المرفقة بالمنشور (حد أقصى 6 صور):</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <input type="text" id="itemImg1" placeholder="رابط الصورة 1">
                <input type="text" id="itemImg2" placeholder="رابط الصورة 2">
                <input type="text" id="itemImg3" placeholder="رابط الصورة 3">
                <input type="text" id="itemImg4" placeholder="رابط الصورة 4">
                <input type="text" id="itemImg5" placeholder="رابط الصورة 5">
                <input type="text" id="itemImg6" placeholder="رابط الصورة 6">
            </div>
            
            <label>نص الوصف والبيانات بالكامل:</label>
            <textarea id="itemText" placeholder="اكتب تفاصيل المحتوى هنا بكل حرية، المساحة مصممة لتستوعب النصوص الطويلة جداً..."></textarea>
        </div>
        
        <label>مكان النشر المخصص (القسم أو المجلد الأب):</label> 
        <select id="parentSelect"></select>
        
        <button class="btn btn-green" style="width:100%; margin-top:15px; font-size:1.1rem;" onclick="saveEntry()">💾 حفظ البيانات والتحيين</button>
        <button class="btn btn-red" style="width:100%; margin-top:5px;" onclick="closeAdder()">إلغاء التغييرات</button>
    </div>
</div>

<div class="container">
    <div id="pathNav" style="display: none; margin-bottom: 15px;">
        <button onclick="goBack()" style="background:#000; color:#fff; border:none; padding:8px 15px; border-radius:8px;">← عودة للمجلد السابق</button>
        <span id="currentPath" style="font-weight:bold; margin-right:10px; color:var(--p-green)"></span>
    </div>
    <div id="directArea"></div>
    <div id="gridArea" class="grid"></div>
</div>

<div class="footer">
    <div class="news-bar">
        <div class="clock" id="liveClock">٠٠:٠٠</div>
        <div class="ticker-wrapper">
            <div class="ticker-move" id="tickerBox">
                <div id="tickerContent" style="display: flex;"></div>
                <div id="tickerContentDup" style="display: flex;"></div>
            </div>
        </div>
    </div>
    <div class="copyright">تصميم محمد ابراهيم مقبل - جميع الحقوق محفوظة 2026 ©</div>
</div>

<div id="viewModal" class="modal" style="display: none;">
    <div class="modal-box">
        <div style="background:#000; color:#fff; padding:10px; display:flex; justify-content:space-between;"><span id="viewT"></span><span onclick="closeViewModal()" style="cursor:pointer; font-size:1.5rem; padding:0 5px;">×</span></div>
        <div id="viewSlider"></div>
        <div id="viewB" style="padding:15px; text-align:right; line-height:1.7; white-space: pre-wrap;"></div>
    </div>
</div>

    var INITIAL_HEAD = "https://i.postimg.cc/rFNkjcrP/file-00000000deec71f5b16228d79c7647b1.png";

    var INITIAL_TICKER_SPEED = "25";

<script>
    let tree = INITIAL_TREE;
    let currentFolderId = null; 
    let navigationHistory = []; 
    let addingType = 'folder';
    let urgentDestinationId = INITIAL_URGENT_DEST;
    let tickerSpeed = INITIAL_TICKER_SPEED;

    let clickCount = 0;
    let lastClickTime = 0;

    window.onload = () => { 
        document.getElementById("adminPanel").style.display = 'none'; 
        document.getElementById("headInp").value = INITIAL_HEAD;
        document.getElementById("siteHeader").style.backgroundImage = `url('${INITIAL_HEAD}')`;
        document.getElementById("urgInp").value = "إطلاق النسخة المحدثة 2026 بنجاح.";
        document.getElementById("urgentText").innerText = "إطلاق النسخة المحدثة 2026 بنجاح.";
        document.getElementById("newsInp").value = INITIAL_NEWS;
        document.getElementById("newsSpeedInp").value = tickerSpeed;
        
        setupTicker(INITIAL_NEWS);
        applyTickerSpeed(tickerSpeed);
        tick(); 
        renderUI(); 
        toggleUrgentBtnVisibility(urgentDestinationId);
        setInterval(tick, 60000); 
    };

    function handleAdminClick() {
        const currentTime = new Date().getTime();
        if (currentTime - lastClickTime > 2000) { clickCount = 0; }
        clickCount++;
        lastClickTime = currentTime;
        if (clickCount === 5) {
            let pass = prompt("الرجاء إدخال كلمة سر لوحة التحكم:");
            if(pass === "1234") { openAdmin(); } else { alert("كلمة السر خاطئة!"); }
            clickCount = 0;
        }
    }

    function openAdmin() { 
        document.getElementById("adminPanel").style.display = 'block'; 
        buildAdminTree(); 
        populateUrgentDestSelect(); 
    }
    function closeAdmin() { document.getElementById("adminPanel").style.display = 'none'; }

    function tick() {
        const now = new Date();
        let hours = now.getHours(); let minutes = now.getMinutes();
        hours = hours < 10 ? '0' + hours : hours; minutes = minutes < 10 ? '0' + minutes : minutes;
        document.getElementById('liveClock').innerText = `${hours}:${minutes}`;
    }

    // بناء آلية شريط الأخبار المتصل بدون أي فراغات
    function setupTicker(text) {
        const content1 = document.getElementById("tickerContent");
        const content2 = document.getElementById("tickerContentDup");
        
        let itemHtml = `<span class="ticker-item">${text}</span><span class="ticker-item">★</span>`;
        content1.innerHTML = itemHtml + itemHtml; 
        content2.innerHTML = itemHtml + itemHtml;
    }

    function applyTickerSpeed(speed) {
        document.getElementById("tickerBox").style.animationDuration = speed + "s";
    }

    function toggleUrgentBtnVisibility(val) {
        const btn = document.getElementById("urgentMoreBtn");
        btn.style.display = (!val || val.trim() === "") ? "none" : "block";
    }

    function renderUI() {
        const gridArea = document.getElementById("gridArea");
        const directArea = document.getElementById("directArea");
        const pathNav = document.getElementById("pathNav");
        const currentPath = document.getElementById("currentPath");

        gridArea.innerHTML = ""; directArea.innerHTML = "";

        let currentItems = (currentFolderId === null) ? tree : (findItemById(tree, currentFolderId)?.children || []);
        if (currentFolderId === null) {
            pathNav.style.display = "none";
        } else {
            pathNav.style.display = "block";
            currentPath.innerText = findItemById(tree, currentFolderId)?.title || "";
        }

        currentItems.forEach(item => {
            if (item.type === 'folder') {
                let card = document.createElement("div"); card.className = "card card-folder"; card.innerText = item.title;
                card.onclick = () => { navigateTo(item.id); }; gridArea.appendChild(card);
            } else if (item.type === 'direct') {
                if (item.mode === 'direct') {
                    let block = document.createElement("div"); block.className = "content-block";
                    let title = document.createElement("div"); title.className = "content-title"; title.innerText = item.title;
                    block.appendChild(title);

                    if(item.imgs && item.imgs[0]) {
                        let img = document.createElement("img"); img.src = item.imgs[0];
                        img.style.width = "100%"; img.style.maxHeight = "300px"; img.style.objectFit = "cover";
                        block.appendChild(img);
                    }
                    let text = document.createElement("div"); text.className = "content-text"; text.innerText = item.content;
                    block.appendChild(text); directArea.appendChild(block);
                } else {
                    let card = document.createElement("div"); card.className = "card card-popup"; card.innerText = item.title;
                    card.onclick = () => { showPopup(item); }; gridArea.appendChild(card);
                }
            }
        });
    }

    function handleUrgentMore() {
        if (!urgentDestinationId || urgentDestinationId === "") return;
        let item = findItemById(tree, urgentDestinationId);
        if (!item) return;
        if (item.type === 'folder') { navigateTo(item.id); } 
        else {
            if (item.mode === 'popup') { showPopup(item); } 
            else { let parent = findParentFolder(tree, item.id); navigateTo(parent ? parent.id : null); }
        }
    }

    function navigateTo(folderId) { navigationHistory.push(currentFolderId); currentFolderId = folderId; renderUI(); }
    function goBack() { if (navigationHistory.length > 0) { currentFolderId = navigationHistory.pop(); renderUI(); } }

    function findItemById(items, id) {
        for (let item of items) {
            if (item.id === id) return item;
            if (item.children) { let found = findItemById(item.children, id); if (found) return found; }
        }
        return null;
    }

    function findParentFolder(items, childId, parent = null) {
        for (let item of items) {
            if (item.id === childId) return parent;
            if (item.children) { let found = findParentFolder(item.children, childId, item); if (found) return found; }
        }
        return null;
    }

    function showPopup(item) {
        document.getElementById("viewT").innerText = item.title;
        document.getElementById("viewB").innerText = item.content;
        const sliderArea = document.getElementById("viewSlider"); sliderArea.innerHTML = "";
        let validImgs = item.imgs ? item.imgs.filter(img => img && img.trim() !== "") : [];

        if (validImgs.length > 0) {
            let wrapper = document.createElement("div"); wrapper.className = "slider-wrapper"; wrapper.id = "slider_pop";
            validImgs.forEach((imgUrl, idx) => {
                let img = document.createElement("img"); img.src = imgUrl;
                img.className = "slider-img" + (idx === 0 ? " active" : ""); img.id = `img_pop_${idx}`;
                wrapper.appendChild(img);
            });
            if (validImgs.length > 1) {
                let prevBtn = document.createElement("button"); prevBtn.className = "slide-btn btn-prev"; prevBtn.innerText = "▶";
                prevBtn.onclick = () => { changeSlide('pop', -1, validImgs.length); };
                let nextBtn = document.createElement("button"); nextBtn.className = "slide-btn btn-next"; nextBtn.innerText = "◀";
                nextBtn.onclick = () => { changeSlide('pop', 1, validImgs.length); };
                let counter = document.createElement("div"); counter.className = "slide-count";
                counter.innerHTML = `<span id="count_pop">1</span> / ${validImgs.length}`;
                wrapper.appendChild(prevBtn); wrapper.appendChild(nextBtn); wrapper.appendChild(counter);
            }
            sliderArea.appendChild(wrapper);
        }
        document.getElementById("viewModal").style.display = "flex";
    }

    function closeViewModal() { document.getElementById("viewModal").style.display = "none"; }

    function changeSlide(sliderId, direction, totalSlides) {
        let countSpan = document.getElementById(`count_${sliderId}`);
        let current = parseInt(countSpan.innerText) + direction;
        if(current > totalSlides) current = 1; if(current < 1) current = totalSlides;
        countSpan.innerText = current;
        for(let i=0; i<totalSlides; i++) { document.getElementById(`img_${sliderId}_${i}`).classList.remove('active'); }
        document.getElementById(`img_${sliderId}_${current-1}`).classList.add('active');
    }

    function buildAdminTree() {
        const adminTree = document.getElementById("adminTree"); adminTree.innerHTML = "<h4>قائمة التعديل الشامل للهيكلية:</h4>";
        function traverse(items, depth = "") {
            items.forEach(item => {
                let div = document.createElement("div"); div.className = "admin-item";
                div.style.borderRightColor = item.type === 'folder' ? 'var(--p-blue)' : 'var(--p-green)';
                let info = document.createElement("div"); info.className = "admin-item-info";
                info.innerHTML = `${depth} ${item.title} <span style="font-size:0.75rem; color:#666; font-weight:normal;">(${item.type === 'folder' ? 'قسم' : (item.mode === 'popup' ? 'بوب اب' : 'منشور مباشر')})</span>`;
                
                let actions = document.createElement("div"); actions.className = "admin-actions";
                let editBtn = document.createElement("button"); editBtn.className = "btn btn-sm btn-orange"; editBtn.innerText = "تعديل ✏️";
                editBtn.onclick = () => { openEditor(item.id); };
                let delBtn = document.createElement("button"); delBtn.className = "btn btn-sm btn-red"; delBtn.innerText = "حذف ❌";
                delBtn.onclick = () => { deleteItem(item.id); };
                
                actions.appendChild(editBtn); actions.appendChild(delBtn); div.appendChild(info); div.appendChild(actions);
                adminTree.appendChild(div); if(item.children) traverse(item.children, depth + "—");
            });
        }
        traverse(tree);
    }

    function populateUrgentDestSelect() {
        const select = document.getElementById("urgentDestSelect");
        select.innerHTML = '<option value="">⚠️ لا تربطه بأي مكان (تعطيل وإخفاء الزر)</option>';
        function traverse(items, depth = "") {
            items.forEach(item => {
                let option = document.createElement("option"); option.value = item.id;
                option.innerText = `${depth} ${item.type === 'folder' ? '📁 قسم:' : '✍️ محتوى:'} ${item.title}`;
                select.appendChild(option); if (item.children) traverse(item.children, depth + "    ");
            });
        }
        traverse(tree); select.value = urgentDestinationId;
    }

    function buildParentSelect(currentId = null) {
        const select = document.getElementById("parentSelect");
        select.innerHTML = '<option value="root">الواجهة الرئيسية للموقع</option>';
        function populateSelect(items, depth = "") {
            items.forEach(item => {
                if (item.type === 'folder' && item.id !== currentId) {
                    let option = document.createElement("option"); option.value = item.id; option.innerText = depth + "📁 " + item.title;
                    select.appendChild(option); if (item.children) populateSelect(item.children, depth + "    ");
                }
            });
        }
        populateSelect(tree);
    }

    function openAdder(type) {
        addingType = type; document.getElementById("editItemId").value = "";
        document.getElementById("itemTitle").value = ""; 
        for(let i=1; i<=6; i++) { document.getElementById(`itemImg${i}`).value = ""; }
        document.getElementById("itemText").value = "";

        buildParentSelect();
        document.getElementById("parentSelect").value = (currentFolderId === null) ? "root" : currentFolderId;
        document.getElementById("extraFields").style.display = (type === 'folder') ? "none" : "block";
        document.getElementById("modalTitle").innerText = (type === 'folder') ? '📁 إضافة قسم جديد' : '✍️ إضافة محتوى جديد';
        document.getElementById("adderModal").style.display = "flex";
    }

    function openEditor(id) {
        let item = findItemById(tree, id); if(!item) return;
        document.getElementById("editItemId").value = item.id;
        document.getElementById("itemTitle").value = item.title;
        addingType = item.type;
        buildParentSelect(item.id);
        document.getElementById("parentSelect").value = findParentFolder(tree, item.id)?.id || "root";
        
        const extraFields = document.getElementById("extraFields");
        if(item.type === 'folder') {
            document.getElementById("modalTitle").innerText = '✏️ تعديل بيانات القسم'; extraFields.style.display = "none";
        } else {
            document.getElementById("modalTitle").innerText = '✏️ تعديل محتويات المنشور'; extraFields.style.display = "block";
            document.getElementById("itemDisplayMode").value = item.mode || "direct";
            for(let i=1; i<=6; i++) {
                document.getElementById(`itemImg${i}`).value = item.imgs ? (item.imgs[i-1] || "") : "";
            }
            document.getElementById("itemText").value = item.content || "";
        }
        document.getElementById("adderModal").style.display = "flex";
    }

    function closeAdder() { document.getElementById("adderModal").style.display = "none"; }

    function saveEntry() {
        const title = document.getElementById("itemTitle").value.trim(); 
        const parentId = document.getElementById("parentSelect").value;
        const editId = document.getElementById("editItemId").value;
        if (!title) { alert("الرجاء إدخال عنوان أولاً!"); return; }

        let targetItem; let isEdit = editId !== "";
        if (isEdit) {
            targetItem = findItemById(tree, editId); removeItemFromTree(tree, editId); targetItem.title = title;
        } else {
            targetItem = { id: "mn" + new Date().getTime(), title: title, type: addingType, children: [] };
        }

        if (addingType === 'direct') {
            targetItem.mode = document.getElementById("itemDisplayMode").value;
            targetItem.imgs = [];
            for(let i=1; i<=6; i++) { targetItem.imgs.push(document.getElementById(`itemImg${i}`).value.trim()); }
            targetItem.content = document.getElementById("itemText").value;
        } else {
            targetItem.mode = "direct"; if(!isEdit) targetItem.imgs = ["","","","","",""];
        }

        if (parentId === "root") { tree.push(targetItem); } 
        else { let p = findItemById(tree, parentId); if (p) { if (!p.children) p.children = []; p.children.push(targetItem); } }

        alert("تم حفظ البيانات بنجاح."); closeAdder(); buildAdminTree(); populateUrgentDestSelect(); renderUI();
    }

    function deleteItem(id) {
        if(confirm("هل تريد حذف هذا العنصر وكل محتوياته؟")) {
            removeItemFromTree(tree, id); if(currentFolderId === id) currentFolderId = null;
            if(urgentDestinationId === id) { urgentDestinationId = ""; toggleUrgentBtnVisibility(""); }
            buildAdminTree(); populateUrgentDestSelect(); renderUI();
        }
    }

    function removeItemFromTree(items, id) {
        for(let i=0; i<items.length; i++) {
            if(items[i].id === id) { items.splice(i, 1); return true; }
            if(items[i].children) { let res = removeItemFromTree(items[i].children, id); if(res) return true; }
        } return false;
    }

    function saveGlobal() {
        let nText = document.getElementById("newsInp").value;
        setupTicker(nText);
        document.getElementById("urgentText").innerText = document.getElementById("urgInp").value;
        document.getElementById("siteHeader").style.backgroundImage = `url('${document.getElementById("headInp").value}')`;
        urgentDestinationId = document.getElementById("urgentDestSelect").value;
        toggleUrgentBtnVisibility(urgentDestinationId);
        
        tickerSpeed = document.getElementById("newsSpeedInp").value || "25";
        applyTickerSpeed(tickerSpeed);
        
        alert("تم تحديث الإعدادات والسرعة المحددة بنجاح.");
    }

    function exportSite() {
        let dataScript = `\nvar INITIAL_TREE = ${JSON.stringify(tree)};\nvar INITIAL_NEWS = "${document.getElementById("newsInp").value.replace(/"/g, '\\"')}";\nvar INITIAL_HEAD = "${document.getElementById("headInp").value}";\nvar INITIAL_URGENT_DEST = "${urgentDestinationId}";\nvar INITIAL_TICKER_SPEED = "${tickerSpeed}";\n`;
        let fullHtml = document.documentElement.outerHTML;
        let regex = /var INITIAL_TREE =[\s\S]*?var INITIAL_TICKER_SPEED = ".*?";/;
        fullHtml = fullHtml.replace(regex, dataScript.trim());
        let blob = new Blob([`<!DOCTYPE html>\n` + fullHtml], {type: "text/html"});
        let a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "index.html"; a.click();
    }
</script>

</body>
