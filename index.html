<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مخيم نت | لوحة التحكم المتطورة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-green: #007A3D; --p-red: #CE1126; --p-black: #000; --p-white: #fff; --p-blue: #2196F3; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 100px; user-select: none; overflow-x: hidden; }
        
        header { 
            background: url('https://i.postimg.cc/rFNkjcrP/file-00000000deec71f5b16228d79c7647b1.png') center/cover no-repeat; 
            height: 160px; border-bottom: 4px solid var(--p-green); position: relative; 
        }
        .header-tag-right { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); color: white; padding: 6px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; z-index: 10; border: 1px solid rgba(255,255,255,0.2); }
        .header-tag-left { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); color: white; padding: 6px 15px; border-radius: 8px; font-size: 0.8rem; z-index: 10; }

        #urgentArea { margin: 15px; background: white; border-right: 5px solid var(--p-red); border-radius: 8px; padding: 12px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(206, 17, 38, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(206, 17, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(206, 17, 38, 0); } }

        .container { padding: 0 15px 15px 15px; min-height: 40vh; }
        .card { background: white; border-radius: 12px; height: 100px; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; padding: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: 1px solid #ddd; cursor: pointer; border-right: 6px solid var(--p-blue); }
        .content-block { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-right: 6px solid var(--p-green); }
        .content-img { width: 100%; max-height: 250px; object-fit: cover; display: block; }
        .content-title { background: var(--p-black); color: white; padding: 10px 15px; font-weight: bold; }
        .content-text { padding: 15px; line-height: 1.8; color: #333; white-space: pre-wrap; }

        /* لوحة التحكم */
        #adminPanel { display: none !important; position: fixed; inset: 0; background: #fff; z-index: 9999; padding: 20px; overflow-y: auto; }
        .admin-nav { position: sticky; top: -20px; background: #fff; z-index: 100; padding: 10px 0; border-bottom: 2px solid var(--p-green); margin-bottom: 20px; }
        .admin-section { background: #f8f9fa; border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .admin-item { background: #fff; border: 1px solid #eee; padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .controls { display: flex; gap: 5px; }

        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; font-family: 'Cairo'; font-size: 14px; box-sizing: border-box; }
        .btn { border: none; border-radius: 8px; cursor: pointer; font-weight: bold; padding: 12px; font-size: 0.9rem; }
        .btn-green { background: var(--p-green); color: white; }
        .btn-red { background: var(--p-red); color: white; }
        .btn-blue { background: var(--p-blue); color: white; }
        .btn-sm { padding: 5px 10px; font-size: 0.75rem; border-radius: 5px; }

        /* بوب آب الإضافة */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: white; width: 100%; max-width: 450px; padding: 20px; border-radius: 15px; max-height: 90vh; overflow-y: auto; }

        /* الفوتر */
        .footer { position: fixed; bottom: 0; width: 100%; z-index: 1000; direction: ltr; }
        .news-bar { background: var(--p-black); color: white; height: 40px; display: flex; align-items: center; overflow: hidden; }
        .clock { background: var(--p-green); padding: 0 15px; height: 100%; display: flex; align-items: center; font-weight: bold; font-size: 0.9rem; z-index: 1001; }
        .ticker-wrapper { flex: 1; height: 100%; overflow: hidden; position: relative; display: flex; align-items: center; }
        .ticker-move { display: flex; position: absolute; white-space: nowrap; right: 0; flex-direction: row-reverse; }
        .ticker-item { padding-left: 100px; font-size: 0.9rem; direction: rtl; }
        .copyright { background: #1a1a1a; color: #888; text-align: center; font-size: 0.7rem; padding: 6px 0; direction: rtl; }
    </style>
</head>
<body>

<header id="siteHeader">
    <div class="header-tag-right" id="adminTrigger">مخيم نت</div>
    <div class="header-tag-left" id="headerDate">-- : --</div>
</header>

<div id="urgentArea">
    <span style="color:red; font-weight:bold;">🔴 خبر هام:</span>
    <b id="urgentText"></b>
</div>

<div id="adminPanel">
    <div class="admin-nav">
        <div style="display:flex; justify-content:space-between; align-items:center;">
             <h2 style="margin:0;">منصة الإدارة</h2>
             <button onclick="closeAdmin()" class="btn btn-red btn-sm">إغلاق X</button>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
            <button class="btn btn-blue" onclick="openAdder('folder')">📁 إضافة صنف / قسم</button>
            <button class="btn btn-green" onclick="openAdder('direct')">✍️ إضافة موضوع / محتوى</button>
        </div>
    </div>

    <!-- الإعدادات العامة -->
    <div class="admin-section">
        <h4>⚙️ إعدادات الواجهة والهوية</h4>
        <label>رابط صورة الهيدر:</label>
        <input type="text" id="headInp">
        <label>الخبر الهام العلوي:</label>
        <input type="text" id="urgInp">
        <label>نص الشريط السفلي:</label>
        <input type="text" id="newsInp">
        <label>سرعة الشريط:</label>
        <input type="range" id="speedSld" min="1" max="10" step="0.5">
        <button class="btn btn-green" style="width:100%; margin-top:10px;" onclick="saveGlobalSettings()">✅ حفظ إعدادات الموقع</button>
    </div>

    <!-- إدارة الأقسام -->
    <div class="admin-section">
        <h4>📁 إدارة شجرة الأقسام</h4>
        <div id="folderManager"></div>
    </div>

    <!-- إدارة المحتويات -->
    <div class="admin-section">
        <h4>✍️ إدارة المواضيع والمحتويات</h4>
        <div id="contentManager"></div>
    </div>

    <button class="btn btn-blue" style="width:100%" onclick="exportSite()">📥 تصدير الكود المحدث بالكامل</button>
</div>

<!-- مودال الإضافة / التعديل -->
<div id="adderModal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modalTitle">إضافة جديد</h3>
        <label>العنوان:</label>
        <input type="text" id="itemTitle">
        <div id="contentFields">
            <label>رابط الصورة:</label>
            <input type="text" id="itemImg">
            <label>النص التفصيلي:</label>
            <textarea id="itemText" rows="5"></textarea>
        </div>
        <label>اختر المكان (التبعية):</label>
        <select id="parentSelect"></select>
        <button class="btn btn-green" style="width:100%" onclick="saveEntry()">💾 حفظ البيانات</button>
        <button class="btn btn-red" style="width:100%" onclick="closeAdder()">إلغاء</button>
    </div>
</div>

<div class="container">
    <div id="pathNav" style="display:none; margin-bottom:15px; align-items:center;">
        <button onclick="goBack()" style="background:#000; color:#fff; border:none; padding:8px 15px; border-radius:8px;">← عودة</button>
        <span id="currentPath" style="font-weight:bold; margin-right:10px; color:var(--p-green)">الرئيسية</span>
    </div>
    <div id="directArea"></div>
    <div id="gridArea" style="display:grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 10px;"></div>
</div>

<div class="footer">
    <div class="news-bar">
        <div class="clock" id="liveClock">00:00</div>
        <div class="ticker-wrapper">
            <div class="ticker-move" id="tickerBox"><div id="tickerContent" style="display: flex;"></div></div>
        </div>
    </div>
    <div class="copyright">تصميم محمد ابراهيم مقبل - جميع الحقوق محفوظة 2026 ©</div>
</div>

<script id="siteData">
    var INITIAL_TREE = [];
    var INITIAL_NEWS = "مرحباً بكم في مخيم نت";
    var INITIAL_HEAD = "https://i.postimg.cc/rFNkjcrP/file-00000000deec71f5b16228d79c7647b1.png";
    var INITIAL_SPEED = 2;
    var INITIAL_URGENT = "";
</script>

<script>
    // الحماية من الفتح التلقائي
    window.onload = () => { document.getElementById("adminPanel").style.setProperty('display', 'none', 'important'); };

    let tree = INITIAL_TREE.length > 0 ? INITIAL_TREE : JSON.parse(localStorage.getItem('mn_pro_tree')) || [];
    let config = {
        news: localStorage.getItem('mn_pro_news') || INITIAL_NEWS,
        head: localStorage.getItem('mn_pro_head') || INITIAL_HEAD,
        speed: parseFloat(localStorage.getItem('mn_pro_speed')) || INITIAL_SPEED,
        urgent: localStorage.getItem('mn_pro_urgent') || INITIAL_URGENT
    };

    let editingId = null;
    let stack = [];

    // الوقت
    function tick() {
        const now = new Date();
        document.getElementById('liveClock').innerText = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit', hour12: false });
        document.getElementById('headerDate').innerText = now.toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        setTimeout(tick, 1000);
    }

    // الشريط الإخباري
    let tPos = 0;
    function startTicker() {
        const content = document.getElementById('tickerContent');
        content.innerHTML = `<span class="ticker-item">${config.news}</span><span class="ticker-item">${config.news}</span>`;
        function animate() {
            tPos += config.speed;
            if (content.children[0] && tPos >= content.children[0].offsetWidth) tPos = 0;
            document.getElementById('tickerBox').style.transform = `translateX(${tPos}px)`;
            requestAnimationFrame(animate);
        }
        animate();
    }

    // إعدادات الخبر الهام
    function applyUrgent() {
        const area = document.getElementById('urgentArea');
        if(config.urgent && config.urgent.trim() !== "") {
            area.style.display = 'block';
            document.getElementById('urgentText').innerText = config.urgent;
        } else { area.style.display = 'none'; }
    }

    // دخول لوحة التحكم
    let clicks = 0;
    document.getElementById('adminTrigger').onclick = () => {
        clicks++;
        if(clicks === 5) {
            if(prompt("كلمة السر:") === "1234") {
                document.getElementById('adminPanel').style.setProperty('display', 'block', 'important');
                document.getElementById('newsInp').value = config.news;
                document.getElementById('headInp').value = config.head;
                document.getElementById('speedSld').value = config.speed;
                document.getElementById('urgInp').value = config.urgent;
                renderAdmin();
            }
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 3000);
    };

    function closeAdmin() { document.getElementById('adminPanel').style.setProperty('display', 'none', 'important'); }

    // إدارة البيانات
    function renderAdmin() {
        const fMan = document.getElementById('folderManager');
        const cMan = document.getElementById('contentManager');
        fMan.innerHTML = ''; cMan.innerHTML = '';

        function walk(arr, depth = 0) {
            arr.forEach(i => {
                const itemHtml = `
                    <div class="admin-item">
                        <span><b>${"—".repeat(depth)}</b> ${i.title}</span>
                        <div class="controls">
                            <button class="btn btn-blue btn-sm" onclick="editItem('${i.id}')">تعديل</button>
                            <button class="btn btn-red btn-sm" onclick="deleteItem('${i.id}')">حذف</button>
                        </div>
                    </div>`;
                if(i.type === 'folder') fMan.innerHTML += itemHtml;
                else cMan.innerHTML += itemHtml;
                if(i.children.length > 0) walk(i.children, depth + 1);
            });
        }
        walk(tree);
    }

    function openAdder(type, id = null) {
        editingId = id;
        document.getElementById('contentFields').style.display = (type === 'direct' || type === 'content') ? 'block' : 'none';
        document.getElementById('modalTitle').innerText = id ? "تعديل البيانات" : "إضافة عنصر جديد";
        
        const sel = document.getElementById('parentSelect');
        sel.innerHTML = '<option value="root">الواجهة الرئيسية</option>';
        function fill(arr, depth=0) {
            arr.forEach(i => {
                if(i.type==='folder' && i.id !== id){ 
                    sel.innerHTML += `<option value="${i.id}">${"—".repeat(depth)} ${i.title}</option>`;
                    fill(i.children, depth+1);
                }
            });
        }
        fill(tree);

        if(id) {
            let item = findById(tree, id);
            document.getElementById('itemTitle').value = item.title;
            document.getElementById('itemImg').value = item.image;
            document.getElementById('itemText').value = item.content;
            sel.value = findParentId(tree, id) || 'root';
        } else {
            document.getElementById('itemTitle').value = '';
            document.getElementById('itemImg').value = '';
            document.getElementById('itemText').value = '';
            document.getElementById('adderModal').dataset.type = type;
        }
        document.getElementById('adderModal').style.display='flex';
    }

    function closeAdder() { document.getElementById('adderModal').style.display='none'; editingId = null; }

    function saveEntry() {
        const t = document.getElementById('itemTitle').value;
        const i = document.getElementById('itemImg').value;
        const c = document.getElementById('itemText').value;
        const pId = document.getElementById('parentSelect').value;
        const type = document.getElementById('adderModal').dataset.type;

        if(!t) return alert("أدخل العنوان");

        if(editingId) {
            // منطق التعديل والنقل
            let item = findById(tree, editingId);
            item.title = t; item.image = i; item.content = c;
            
            // النقل
            let oldParentArr = findParentArray(tree, editingId);
            let targetParentArr = pId === 'root' ? tree : findById(tree, pId).children;
            
            if(oldParentArr !== targetParentArr) {
                let idx = oldParentArr.findIndex(x => x.id == editingId);
                let extracted = oldParentArr.splice(idx, 1)[0];
                targetParentArr.unshift(extracted);
            }
        } else {
            // منطق الإضافة الجديدة
            const newItem = { id: 'mn'+Date.now(), title: t, type: type, image: i, content: c, children: [] };
            if(pId === 'root') tree.unshift(newItem);
            else findById(tree, pId).children.unshift(newItem);
        }

        saveTree(); closeAdder(); renderAdmin(); renderUI();
    }

    function saveGlobalSettings() {
        config.news = document.getElementById('newsInp').value;
        config.head = document.getElementById('headInp').value;
        config.speed = parseFloat(document.getElementById('speedSld').value);
        config.urgent = document.getElementById('urgInp').value;
        
        localStorage.setItem('mn_pro_news', config.news);
        localStorage.setItem('mn_pro_head', config.head);
        localStorage.setItem('mn_pro_speed', config.speed);
        localStorage.setItem('mn_pro_urgent', config.urgent);
        
        location.reload();
    }

    function editItem(id) {
        let item = findById(tree, id);
        openAdder(item.type, id);
    }

    function deleteItem(id) {
        if(!confirm("حذف؟")) return;
        let arr = findParentArray(tree, id);
        let idx = arr.findIndex(x => x.id == id);
        arr.splice(idx, 1);
        saveTree(); renderAdmin(); renderUI();
    }

    // وظائف المساعدة
    function findById(arr, id) {
        for(let i of arr) { if(i.id == id) return i; if(i.children.length>0) { let f = findById(i.children, id); if(f) return f; } }
    }
    function findParentArray(arr, id) {
        for(let i=0; i<arr.length; i++) { if(arr[i].id == id) return arr; if(arr[i].children.length>0) { let f = findParentArray(arr[i].children, id); if(f) return f; } }
    }
    function findParentId(arr, id, pId = null) {
        for(let i of arr) { if(i.id == id) return pId; if(i.children.length>0) { let f = findParentId(i.children, id, i.id); if(f) return f; } }
    }

    function renderUI() {
        const grid = document.getElementById('gridArea'); grid.innerHTML = '';
        const dc = document.getElementById('directArea'); dc.innerHTML = '';
        const nav = document.getElementById('pathNav');
        let cur = stack.length > 0 ? stack[stack.length - 1].children : tree;

        nav.style.display = stack.length > 0 ? 'flex' : 'none';
        if(stack.length>0) document.getElementById('currentPath').innerText = stack[stack.length-1].title;

        cur.forEach(i => {
            if(i.type === 'folder') {
                const c = document.createElement('div'); c.className = 'card'; c.innerText = i.title;
                c.onclick = () => { stack.push(i); renderUI(); window.scrollTo(0,0); }; grid.appendChild(c);
            } else {
                const b = document.createElement('div'); b.className = 'content-block';
                b.innerHTML = `<div class="content-title">${i.title}</div>${i.image?`<img src="${i.image}" class="content-img">`:''}<div class="content-text">${i.content.replace(/\n/g,'<br>')}</div>`;
                dc.appendChild(b);
            }
        });
    }

    function goBack() { stack.pop(); renderUI(); }
    function saveTree() { localStorage.setItem('mn_pro_tree', JSON.stringify(tree)); }
    function exportSite() {
        let snippet = document.documentElement.outerHTML.replace(document.getElementById('siteData').innerHTML, `var INITIAL_TREE = ${JSON.stringify(tree)};\n    var INITIAL_NEWS = ${JSON.stringify(config.news)};\n    var INITIAL_HEAD = ${JSON.stringify(config.head)};\n    var INITIAL_SPEED = ${config.speed};\n    var INITIAL_URGENT = ${JSON.stringify(config.urgent)};`);
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(["<!DOCTYPE html>\n" + snippet], {type:'text/html'}));
        a.download = 'MukhayamNet_Final_Pro.html'; a.click();
    }

    tick(); startTicker(); applyUrgent();
    document.getElementById('siteHeader').style.backgroundImage = `url('${config.head}')`;
    renderUI();
</script>
</body>
</html>
