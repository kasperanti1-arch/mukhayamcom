<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مخيم نت | 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-green: #007A3D; --p-red: #CE1126; --p-black: #000; --p-white: #fff; --p-blue: #007bff; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 90px; user-select: none; }
        
        /* الهيدر المتطور مع شريط شفاف */
        header { 
            background: url('https://i.postimg.cc/rFNkjcrP/file-00000000deec71f5b16228d79c7647b1.png') center/cover no-repeat; 
            height: 160px; 
            border-bottom: 4px solid var(--p-green);
            position: relative;
        }
        
        .header-glass {
            position: absolute;
            top: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            color: white;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            z-index: 10;
        }

        .admin-trigger-area { cursor: pointer; font-weight: bold; font-size: 1.2rem; }

        .container { padding: 15px; min-height: 50vh; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card { background: white; border-radius: 12px; height: 100px; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; padding: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: 1px solid #ddd; cursor: pointer; }
        
        /* لوحة التحكم */
        #adminPanel { display: none; position: fixed; inset: 0; background: #fff; z-index: 9999; padding: 20px; overflow-y: auto; }
        .admin-item { background: #f9f9f9; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd; border-right: 6px solid var(--p-green); }
        
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-family: 'Cairo'; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-green { background: var(--p-green); color: white; }
        .btn-red { background: var(--p-red); color: white; }

        /* الفوتر المحسن */
        .footer { position: fixed; bottom: 0; width: 100%; z-index: 1000; }
        .news-bar { background: var(--p-black); color: white; height: 40px; display: flex; align-items: center; overflow: hidden; position: relative; }
        .clock { background: var(--p-green); padding: 0 15px; height: 100%; display: flex; align-items: center; font-weight: bold; z-index: 1001; font-size: 0.9rem; }
        .ticker-text { position: absolute; white-space: nowrap; padding-left: 100%; animation: ticker-move 20s linear infinite; line-height: 40px; font-size: 0.9rem; }
        @keyframes ticker-move { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .copyright { background: #1a1a1a; color: #888; text-align: center; font-size: 0.7rem; padding: 5px 0; border-top: 1px solid #333; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: white; width: 100%; max-width: 450px; border-radius: 15px; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body>

<header id="siteHeader">
    <div class="header-glass">
        <span class="admin-trigger-area" id="adminTrigger">مخيم نت</span>
        <span id="headerDate">التاريخ..</span>
    </div>
</header>

<div id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>لوحة التحكم الإدارية</h2>
        <button onclick="closeAdminNow()" class="btn-red" style="width:auto; padding:5px 15px;">إغلاق X</button>
    </div>

    <div class="admin-item">
        <h4>🖼️ إعدادات الهوية البصرية</h4>
        <label>رابط صورة الهيدر (URL):</label>
        <input type="text" id="headerImgInput" placeholder="ضع رابط صورة الهيدر هنا...">
        <button class="btn btn-green" onclick="updateHeader()">تحديث صورة الهيدر</button>
    </div>

    <div class="admin-item">
        <h4>⚙️ الشريط الإخباري</h4>
        <input type="text" id="newsInput" placeholder="اكتب الخبر العاجل...">
        <button class="btn btn-green" onclick="saveNewsDraft()">تحديث الخبر</button>
    </div>

    <div id="adminTreeContainer"></div>
    <button class="btn btn-green" onclick="addItemToTree()">+ إضافة بطاقة رئيسية</button>
    <button class="btn btn-green" style="background:#005a2d;" onclick="publishChanges()">🚀 نشر التعديلات النهائية</button>
    <hr>
    <button class="btn" style="background:#2c3e50; color:white;" onclick="exportFullCode()">📥 تصدير الكود المحدث</button>
</div>

<div class="container">
    <div id="mainGrid" class="grid"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <div style="background:#000; color:#fff; padding:12px; display:flex; justify-content:space-between;">
            <span id="modalTitle"></span>
            <span onclick="document.getElementById('modal').style.display='none'" style="cursor:pointer; font-size:1.8rem;">&times;</span>
        </div>
        <img id="modalImg" style="width:100%; display:none; border-bottom:4px solid var(--p-green);">
        <div id="modalBody" style="padding:20px; text-align:right; line-height:1.7;"></div>
    </div>
</div>

<div class="footer">
    <div class="news-bar">
        <div class="clock" id="liveClock">00:00</div>
        <div class="ticker-wrapper" style="flex:1; height:100%; position:relative;">
            <div class="ticker-text" id="newsTicker">أهلاً بكم في مخيم نت</div>
        </div>
    </div>
    <div class="copyright">
        تصميم محمد ابراهيم مقبل - جميع الحقوق محفوظة 2026 ©
    </div>
</div>

<script id="dataInjection">
    var INITIAL_TREE = [];
    var INITIAL_NEWS = "مخيم نت - صوت القضية واللاجئ";
    var INITIAL_HEADER = "https://i.postimg.cc/rFNkjcrP/file-00000000deec71f5b16228d79c7647b1.png";
</script>

<script>
    window.onload = () => { document.getElementById('adminPanel').style.display = 'none'; };

    let tree = INITIAL_TREE.length > 0 ? INITIAL_TREE : JSON.parse(localStorage.getItem('mn_v2026_data') || '[]');
    let draftTree = JSON.parse(JSON.stringify(tree));
    let newsLine = INITIAL_NEWS !== "مخيم نت - صوت القضية واللاجئ" ? INITIAL_NEWS : localStorage.getItem('mn_v2026_news') || INITIAL_NEWS;
    let headerUrl = INITIAL_HEADER !== "" ? INITIAL_HEADER : localStorage.getItem('mn_v2026_header') || "https://i.postimg.cc/rFNkjcrP/file-00000000deec71f5b16228d79c7647b1.png";

    function updateHeaderDisplay() {
        document.getElementById('siteHeader').style.backgroundImage = `url('${headerUrl}')`;
    }

    function updateDateTime() {
        const now = new Date();
        // ساعة بدون ثواني
        document.getElementById('liveClock').innerText = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit', hour12: false });
        // تاريخ كامل
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('headerDate').innerText = now.toLocaleDateString('ar-EG', options);
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();
    updateHeaderDisplay();

    let clickCount = 0;
    document.getElementById('adminTrigger').onclick = () => {
        clickCount++;
        if (clickCount === 5) {
            if (prompt("كلمة السر الإدارية:") === "1234") {
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('newsInput').value = newsLine;
                document.getElementById('headerImgInput').value = headerUrl;
                renderAdmin();
            }
            clickCount = 0;
        }
        setTimeout(() => clickCount = 0, 3000);
    };

    function closeAdminNow() { document.getElementById('adminPanel').style.display = 'none'; }

    function updateHeader() {
        headerUrl = document.getElementById('headerImgInput').value;
        updateHeaderDisplay();
        alert("تم تحديث الرابط مؤقتاً.. اضغط نشر للحفظ النهائي");
    }

    function saveNewsDraft() {
        newsLine = document.getElementById('newsInput').value;
        document.getElementById('newsTicker').innerText = newsLine;
    }

    function publishChanges() {
        tree = JSON.parse(JSON.stringify(draftTree));
        localStorage.setItem('mn_v2026_data', JSON.stringify(tree));
        localStorage.setItem('mn_v2026_news', newsLine);
        localStorage.setItem('mn_v2026_header', headerUrl);
        renderUI();
        alert("🚀 تم النشر بنجاح!");
    }

    function addItemToTree() {
        draftTree.push({ id: Date.now(), title: "عنصر جديد", type: "content", content: "", image: "", children: [] });
        renderAdmin();
    }

    function renderAdmin() {
        const container = document.getElementById('adminTreeContainer');
        container.innerHTML = '<h4>تعديل العناصر:</h4>';
        function draw(arr, depth = 0) {
            let html = `<div style="margin-right:${depth*15}px; border-right:2px solid #ddd; padding-right:10px;">`;
            arr.forEach(item => {
                html += `
                    <div class="admin-item">
                        <input type="text" value="${item.title}" oninput="updateField(${item.id}, 'title', this.value)">
                        <select onchange="updateField(${item.id}, 'type', this.value); renderAdmin();">
                            <option value="content" ${item.type==='content'?'selected':''}>محتوى</option>
                            <option value="folder" ${item.type==='folder'?'selected':''}>قسم</option>
                        </select>
                        ${item.type === 'content' ? `<input type="text" value="${item.image||''}" oninput="updateField(${item.id},'image',this.value)" placeholder="رابط صورة"><textarea oninput="updateField(${item.id},'content',this.value)">${item.content}</textarea>` : `<button onclick="addBranch(${item.id})" class="btn" style="background:#007bff; color:white; font-size:0.7rem;">+ فرع</button>`}
                        <button onclick="deleteItem(${item.id})" style="color:red; background:none; border:none; cursor:pointer;">حذف 🗑️</button>
                    </div>`;
                if (item.children && item.children.length > 0) html += draw(item.children, depth + 1);
            });
            return html + '</div>';
        }
        container.innerHTML += draw(draftTree);
    }
    
    function updateField(id, f, v) { 
        function walk(arr){ for(let i of arr){ if(i.id==id){i[f]=v; return;} if(i.children) walk(i.children); }}
        walk(draftTree);
    }
    function addBranch(id){
        function walk(arr){ for(let i of arr){ if(i.id==id){i.children.push({id:Date.now(), title:"فرع جديد", type:"content", content:"", children:[]}); break;} if(i.children) walk(i.children); }}
        walk(draftTree); renderAdmin();
    }
    function deleteItem(id){
        if(!confirm("حذف؟")) return;
        function walk(arr){ for(let i=0; i<arr.length; i++){ if(arr[i].id==id){arr.splice(i,1); return true;} if(arr[i].children && walk(arr[i].children)) return true; }}
        walk(draftTree); renderAdmin();
    }

    function renderUI() {
        const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
        tree.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            if(item.type==='folder') card.style.borderRight = "6px solid var(--p-blue)";
            card.innerText = item.title;
            card.onclick = () => {
                if(item.type==='content'){
                    document.getElementById('modalTitle').innerText = item.title;
                    document.getElementById('modalBody').innerHTML = item.content.replace(/\n/g, '<br>');
                    const img = document.getElementById('modalImg');
                    if(item.image){ img.src = item.image; img.style.display='block'; } else img.style.display='none';
                    document.getElementById('modal').style.display='flex';
                } else alert("هذا القسم يحتوي فروعاً (سيتم تطوير التنقل لاحقاً إذا رغبت)");
            };
            grid.appendChild(card);
        });
    }

    function exportFullCode() {
        const treeData = JSON.stringify(tree);
        const newsData = JSON.stringify(newsLine);
        const headData = JSON.stringify(headerUrl);
        let htmlSnippet = document.documentElement.outerHTML;
        const newDataScript = `var INITIAL_TREE = ${treeData};\n    var INITIAL_NEWS = ${newsData};\n    var INITIAL_HEADER = ${headData};`;
        const oldDataScript = document.getElementById('dataInjection').innerHTML;
        htmlSnippet = htmlSnippet.replace(oldDataScript, newDataScript);
        const blob = new Blob(["<!DOCTYPE html>\n<html lang='ar' dir='rtl'>" + htmlSnippet + "</html>"], {type: 'text/html'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = 'MukhayamNet_2026.html'; a.click();
    }

    document.getElementById('newsTicker').innerText = newsLine;
    renderUI();
</script>
</body>
</html>
